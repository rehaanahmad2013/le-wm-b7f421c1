apiVersion: batch/v1
kind: Job
metadata:
  name: lewm-{{ORX_RUN}}
  labels:
    orx-primary: "true"
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: reproduction
          image: nvcr.io/nvidia/pytorch:25.06-py3
          command: ["bash", "-c", "$ORX_SCRIPT"]
          env:
            - name: STABLEWM_HOME
              value: /shared/stablewm
            - name: LOCAL_DATASET_DIR
              value: /shared/stablewm
            - name: HF_HOME
              value: /shared/huggingface
            - name: PIP_CACHE_DIR
              value: /shared/pip-cache
            - name: MUJOCO_GL
              value: egl
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "8"
              memory: 48Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: 128Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: shared-cache
              mountPath: /shared
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: shared-cache
          persistentVolumeClaim:
            claimName: lewm-shared-cache
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
