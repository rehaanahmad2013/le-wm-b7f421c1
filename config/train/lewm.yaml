defaults:
  - _self_
  - launcher: local
  - data: pusht
  - model: lewm

output_model_name: lewm
subdir: ${hydra:job.id}

num_workers: 6
train_split: 0.9
seed: 3072
img_size: 224
embed_dim: 192
history_size: 3

trainer:
  # The paper trains for 10 epochs. The released repository originally said
  # 100; that disagreement is retained as an explicit experiment variant.
  max_epochs: 10
  devices: 1
  accelerator: gpu
  precision: bf16
  gradient_clip_val: 1.0

loader:
  batch_size: 128
  num_workers: ${num_workers}
  persistent_workers: True
  prefetch_factor: 3
  pin_memory: True

optimizer:
  type: AdamW
  lr: 5e-5
  weight_decay: 1e-3

num_preds: 1

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024

wandb:
  enabled: false
  config:
    entity: lewm-reproduction
    project: lewm-reproduction
    name: ${output_model_name}
    id: ${subdir}
    resume: allow
    log_model: false
